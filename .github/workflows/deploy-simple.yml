name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build
        run: mvn clean package -DskipTests
      
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt
            git clone https://github.com/fengjianchaoit-hub/wolfpack-backend.git || true
            cd wolfpack-backend
            mvn clean package -DskipTests
            pkill -f wolfpack-admin || true
            nohup java -jar wolfpack-admin/target/wolfpack-admin-1.0.0-SNAPSHOT.jar > /var/log/wolfpack.log 2>&1 &