name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      working-directory: ./wolfpack-backend
      run: mvn clean package -DskipTests -B
    
    - name: Build Docker Image
      working-directory: ./wolfpack-backend
      run: |
        docker build -t wolfpack-backend:latest .
        docker save wolfpack-backend:latest | gzip > wolfpack-backend.tar.gz
    
    - name: Upload Docker Image to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        source: "wolfpack-backend/wolfpack-backend.tar.gz"
        target: "/opt/wolfpack-java/"
        strip_components: 1
    
    - name: Upload Docker Compose to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        source: "wolfpack-backend/docker-compose.yml"
        target: "/opt/wolfpack-java/"
        strip_components: 1
    
    - name: Start Services
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd /opt/wolfpack-java
          docker load < wolfpack-backend.tar.gz
          docker-compose down || true
          docker-compose up -d
          sleep 5
          docker ps | grep wolfpack
          curl -s http://localhost:8080/api/v1/dashboard/health || echo "Health check failed"
