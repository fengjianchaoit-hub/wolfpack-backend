name: Build and Deploy
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      working-directory: ./wolfpack-backend
      run: mvn clean package -DskipTests -B
    - name: Build Docker Image
      working-directory: ./wolfpack-backend
      run: |
        docker build -t wolfpack-backend:${{ github.sha }} .
        docker tag wolfpack-backend:${{ github.sha }} wolfpack-backend:latest
    - name: Save Docker Image
      working-directory: ./wolfpack-backend
      run: docker save wolfpack-backend:latest | gzip > wolfpack-backend.tar.gz
    - name: Move artifacts to root
      run: |
        mv wolfpack-backend/wolfpack-backend.tar.gz ./
        mv wolfpack-backend/docker-compose.yml ./
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: wolfpack-backend.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: docker-image
    - name: Deploy to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "wolfpack-backend.tar.gz,docker-compose.yml"
        target: "/opt/wolfpack-java"
    - name: Restart Services
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          cd /opt/wolfpack-java
          docker load < wolfpack-backend.tar.gz
          docker-compose down
          docker-compose up -d
          rm wolfpack-backend.tar.gz
