name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      working-directory: ./wolfpack-backend
      run: mvn clean package -DskipTests -B
    
    - name: Build Docker Image
      working-directory: ./wolfpack-backend
      run: |
        docker build -t wolfpack-backend:latest .
        docker save wolfpack-backend:latest | gzip > wolfpack-backend.tar.gz
    
    - name: Upload Docker Image to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}  # 使用SSH密钥替代密码
        port: ${{ secrets.SERVER_PORT || '22' }}
        source: "wolfpack-backend/wolfpack-backend.tar.gz"
        target: "/opt/wolfpack-java/"
        strip_components: 1
    
    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}  # 使用SSH密钥
        port: ${{ secrets.SERVER_PORT || '22' }}
        script: |
          cd /opt/wolfpack-java
          docker load < wolfpack-backend.tar.gz
          docker stop wolfpack-backend || true
          docker rm wolfpack-backend || true
          docker run -d \
            --name wolfpack-backend \
            -p 8080:8080 \
            --restart unless-stopped \
            -m 512m \
            wolfpack-backend:latest
          sleep 5
          docker ps | grep wolfpack
          curl -s http://localhost:8080/api/v1/dashboard/health || echo "Health check failed"
