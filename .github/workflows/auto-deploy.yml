name: End-to-End Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. 设置JDK
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    # 3. 构建后端
    - name: Build Backend
      working-directory: ./wolfpack-backend
      run: mvn clean package -DskipTests -B
    
    # 4. 构建Docker镜像并导出
    - name: Build Docker Image
      working-directory: ./wolfpack-backend
      run: |
        docker build -t wolfpack-backend:latest .
        docker save wolfpack-backend:latest | gzip > wolfpack-backend.tar.gz
    
    # 5. 上传后端镜像到服务器
    - name: Upload Backend to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "wolfpack-backend/wolfpack-backend.tar.gz"
        target: "/opt/wolfpack-java/"
        strip_components: 1
    
    # 6. 上传前端代码到服务器
    - name: Upload Frontend to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "wolfpack-dashboard/index.html"
        target: "/opt/wolfpack-dashboard/html/"
        strip_components: 1
    
    # 7. 部署到服务器（全自动化）
    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          echo "=== 部署后端 ==="
          cd /opt/wolfpack-java
          docker load < wolfpack-backend.tar.gz
          docker stop wolfpack-backend 2>/dev/null || true
          docker rm wolfpack-backend 2>/dev/null || true
          docker run -d \
            --name wolfpack-backend \
            -p 8080:8080 \
            --restart unless-stopped \
            -m 512m \
            wolfpack-backend:latest
          
          echo "=== 部署前端 ==="
          docker restart wolfpack-frontend
          
          echo "=== 等待服务启动 ==="
          sleep 15
          
          echo "=== 健康检查 ==="
          curl -s http://localhost:8080/api/v1/dashboard/health | grep -q "success" && echo "✅ 后端正常" || echo "❌ 后端异常"
          curl -s http://localhost:80 | grep -q "狼牙团队" && echo "✅ 前端正常" || echo "❌ 前端异常"
          
          echo "=== 部署完成 ==="
    
    # 8. 通知结果（可选）
    - name: Deployment Notification
      if: always()
      run: |
        echo "部署状态: ${{ job.status }}"
