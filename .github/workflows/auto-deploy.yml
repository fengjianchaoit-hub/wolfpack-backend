name: End-to-End Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. 设置JDK
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    # 3. 设置Node.js并构建前端
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Build Frontend
      working-directory: ./wolfpack-dashboard
      run: |
        npm install
        npm run build
    
    # 4. 构建后端
    - name: Build Backend
      working-directory: ./wolfpack-backend
      run: mvn clean package -DskipTests -B
    
    # 5. 构建Docker镜像并导出
    - name: Build Docker Image
      working-directory: ./wolfpack-backend
      run: |
        docker build -t wolfpack-backend:latest .
        docker save wolfpack-backend:latest | gzip > wolfpack-backend.tar.gz
    
    # 6. 上传后端镜像到服务器
    - name: Upload Backend Image to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "wolfpack-backend/wolfpack-backend.tar.gz"
        target: "/opt/wolfpack-java/"
        strip_components: 1
    
    # 7. 上传前端代码到服务器
    - name: Upload Frontend to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "wolfpack-dashboard/dist/*"
        target: "/opt/wolfpack-dashboard/html/"
        strip_components: 2
    
    # 7. 部署到服务器（Docker 纯命令部署）
    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          echo "=== 加载后端镜像 ==="
          cd /opt/wolfpack-java
          docker load < wolfpack-backend.tar.gz
          docker images | grep wolfpack-backend
          
          echo "=== 启动 PostgreSQL ==="
          docker stop wolfpack-postgres 2>/dev/null || true
          docker rm wolfpack-postgres 2>/dev/null || true
          docker run -d \
            --name wolfpack-postgres \
            -e POSTGRES_DB=wolfpack \
            -e POSTGRES_USER=wolfpack \
            -e POSTGRES_PASSWORD=wolfpack123 \
            -v postgres_data:/var/lib/postgresql/data \
            -p 5432:5432 \
            --restart unless-stopped \
            postgres:15-alpine
          
          echo "=== 等待 PostgreSQL 就绪（15秒）==="
          sleep 15
          
          echo "=== 启动后端服务 ==="
          docker stop wolfpack-backend 2>/dev/null || true
          docker rm wolfpack-backend 2>/dev/null || true
          docker run -d \
            --name wolfpack-backend \
            --link wolfpack-postgres:postgres \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/wolfpack \
            -e SPRING_DATASOURCE_USERNAME=wolfpack \
            -e SPRING_DATASOURCE_PASSWORD=wolfpack123 \
            -p 8080:8080 \
            --restart unless-stopped \
            wolfpack-backend:latest
          
          echo "=== 重启 Nginx（连接后端）==="
          docker restart wolfpack-frontend || true
          
          echo "=== 等待服务启动（20秒）==="
          sleep 20
          
          echo "=== 容器状态 ==="
          docker ps -a | grep wolfpack
          
          echo "=== PostgreSQL 日志（最近10行）==="
          docker logs wolfpack-postgres --tail 10 2>/dev/null || echo "PostgreSQL 未运行"
          
          echo "=== 后端日志（最近20行）==="
          docker logs wolfpack-backend --tail 20 2>/dev/null || echo "后端未运行"
          
          echo "=== 健康检查 ==="
          HEALTH_STATUS=$(curl -s http://localhost:8080/api/v1/dashboard/health | grep -o '"status":"ok"' || echo "fail")
          
          if [ "$HEALTH_STATUS" = '"status":"ok"' ]; then
            echo "✅ 后端健康检查通过"
            echo "=== 记录部署日志 ==="
            curl -s -X POST http://localhost:8080/api/v1/tasks/logs \
              -H "Content-Type: application/json" \
              -d '{"agentId":"wolf-head","action":"GitHub Actions 自动部署完成","status":"success","details":"代码提交触发自动部署，服务已恢复正常"}' || echo "日志记录失败（非关键）"
          else
            echo "❌ 后端健康检查失败"
          fi
          
          echo "=== 部署完成 ==="
    
    # 8. 通知结果（可选）
    - name: Deployment Notification
      if: always()
      run: |
        echo "部署状态: ${{ job.status }}"
