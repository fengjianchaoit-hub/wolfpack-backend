name: Auto Deploy WolfPack

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H 47.84.71.25 >> ~/.ssh/known_hosts
    
    - name: Deploy Backend
      run: |
        ssh -i ~/.ssh/deploy_key admin@47.84.71.25 "
          cd /opt/wolfpack-java
          docker restart wolfpack-backend 2>/dev/null || echo 'Backend running'
          echo 'Backend OK'
        "
    
    - name: Deploy Frontend
      run: |
        rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
          wolfpack_dashboard/index.html \
          admin@47.84.71.25:/opt/wolfpack-dashboard/html/
        
        ssh -i ~/.ssh/deploy_key admin@47.84.71.25 "
          docker restart wolfpack-frontend
          echo 'Frontend OK'
        "
    
    - name: Verify
      run: |
        sleep 3
        curl -s http://47.84.71.25:8080/api/v1/dashboard/health | head -c 100
        echo ""
        echo "✅ 部署完成"
