name: End-to-End Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. 设置JDK
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    # 3. 构建后端
    - name: Build Backend
      working-directory: ./wolfpack-backend
      run: mvn clean package -DskipTests -B
    
    # 4. 构建Docker镜像并导出
    - name: Build Docker Image
      working-directory: ./wolfpack-backend
      run: |
        docker build -t wolfpack-backend:latest .
        docker save wolfpack-backend:latest | gzip > wolfpack-backend.tar.gz
    
    # 5. 上传后端代码到服务器
    - name: Upload Backend to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "wolfpack-backend/wolfpack-backend.tar.gz,wolfpack-backend/docker-compose.yml"
        target: "/opt/wolfpack-java/"
        strip_components: 1
    
    # 6. 上传前端代码到服务器
    - name: Upload Frontend to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "wolfpack-dashboard/index.html"
        target: "/opt/wolfpack-dashboard/html/"
        strip_components: 1
    
    # 7. 部署到服务器（Docker Compose全栈）
    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          echo "=== 检查 Docker 和 Docker Compose ==="
          docker --version
          docker-compose --version || docker compose version
          
          echo "=== 加载后端镜像 ==="
          cd /opt/wolfpack-java
          docker load < wolfpack-backend.tar.gz
          docker images | grep wolfpack-backend
          
          echo "=== 清理旧容器 ==="
          docker stop wolfpack-backend wolfpack-postgres 2>/dev/null || true
          docker rm wolfpack-backend wolfpack-postgres 2>/dev/null || true
          
          echo "=== 启动全栈服务（PostgreSQL + Backend + Nginx）==="
          # 使用 docker compose（新版）或 docker-compose（旧版）
          if docker compose version &>/dev/null; then
            echo "Using: docker compose"
            docker compose down 2>/dev/null || true
            docker compose up -d
          else
            echo "Using: docker-compose"
            docker-compose down 2>/dev/null || true
            docker-compose up -d
          fi
          
          echo "=== 等待服务启动（30秒）==="
          sleep 30
          
          echo "=== 容器状态 ==="
          docker ps -a | grep wolfpack
          
          echo "=== PostgreSQL 日志（最近20行）==="
          docker logs wolfpack-postgres --tail 20 2>/dev/null || echo "PostgreSQL 容器未运行"
          
          echo "=== 后端日志（最近20行）==="
          docker logs wolfpack-backend --tail 20 2>/dev/null || echo "后端容器未运行"
          
          echo "=== 健康检查 ==="
          curl -s http://localhost:8080/api/v1/dashboard/health || echo "后端健康检查失败"
          curl -s http://localhost:80 | grep -o "狼牙团队" | head -1 || echo "前端检查失败"
          
          echo "=== 部署完成 ==="
    
    # 8. 通知结果（可选）
    - name: Deployment Notification
      if: always()
      run: |
        echo "部署状态: ${{ job.status }}"
