name: Deploy All

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true  # <-- 添加这行
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
    
    - name: Copy Frontend Files (scp)
      run: |
        # 检查文件是否存在
        ls -la wolfpack_dashboard/
        
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          wolfpack_dashboard/index.html \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/wolfpack-dashboard/html/
        
        echo "✅ 前端文件已复制"
    
    - name: Restart Frontend
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "docker restart wolfpack-frontend && echo 'Deployed'"
    
    - name: Verify
      run: |
        sleep 3
        curl -s http://${{ secrets.SERVER_HOST }}:8080/api/v1/dashboard/health | head -c 100
        echo ""
        echo "✅ 部署完成"
