name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn clean package -DskipTests
      - uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt
            rm -rf wolfpack-simple
            git clone https://github.com/fengjianchaoit-hub/wolfpack-simple.git || true
            cd wolfpack-simple
            mvn clean package -DskipTests
            pkill -f wolfpack-simple || true
            nohup java -jar target/wolfpack-simple-1.0.0.jar > /var/log/wolfpack.log 2>&1 &