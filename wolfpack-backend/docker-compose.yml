version: '3.8'

services:
  wolfpack-backend:
    build: .
    container_name: wolfpack-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    restart: unless-stopped
    networks:
      - wolfpack-network

  nginx:
    image: nginx:alpine
    container_name: wolfpack-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./html:/usr/share/nginx/html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - wolfpack-backend
    restart: unless-stopped
    networks:
      - wolfpack-network

networks:
  wolfpack-network:
    driver: bridge