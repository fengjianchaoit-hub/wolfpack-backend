server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: wolfpack-admin
  
  # Redis缓存配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      database: 0
  
  # 缓存配置 - 执行日志缓存60秒
  cache:
    type: redis
    redis:
      time-to-live: 60000  # 60秒过期
      cache-null-values: false
  
  # PostgreSQL数据库配置（支持环境变量覆盖）
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wolfpack}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:wolfpack}
    password: ${SPRING_DATASOURCE_PASSWORD:wolfpack123}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # 禁用默认的Spring Security（简化部署）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# 日志配置
logging:
  level:
    com.wolfpack: INFO
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always