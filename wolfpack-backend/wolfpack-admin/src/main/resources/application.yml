server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: wolfpack-admin
  
  # 数据库配置（使用H2内存数据库，快速启动）
  datasource:
    url: jdbc:h2:mem:wolfpack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  
  # 禁用默认的Spring Security（简化部署）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# 日志配置
logging:
  level:
    com.wolfpack: INFO
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always