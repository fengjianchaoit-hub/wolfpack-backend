server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: wolfpack-admin
  
  # PostgreSQL数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/wolfpack
    driver-class-name: org.postgresql.Driver
    username: wolfpack
    password: ${DB_PASSWORD:wolfpack123}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # 禁用默认的Spring Security（简化部署）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# 日志配置
logging:
  level:
    com.wolfpack: INFO
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always