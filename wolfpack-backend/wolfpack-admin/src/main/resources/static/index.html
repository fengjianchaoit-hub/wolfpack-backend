<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狼牙团队监控仪表盘 | WolfPack Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0f1419; 
            color: #e6edf3; 
            min-height: 100vh; 
        }
        .header { 
            background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%); 
            padding: 20px 30px; 
            border-bottom: 1px solid #30363d; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .header h1 { 
            font-size: 24px; 
            background: linear-gradient(90deg, #58a6ff, #238636); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #238636; animation: pulse 2s infinite; }
        .status-dot.error { background: #da3633; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .refresh-indicator { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #8b949e; }
        .refresh-icon { width: 16px; height: 16px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; }
        .refresh-icon.idle { animation: none; border-color: #238636; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; transition: transform 0.2s, border-color 0.2s; }
        .metric-card:hover { transform: translateY(-2px); border-color: #58a6ff; }
        .metric-label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .metric-value { font-size: 32px; font-weight: 700; color: #e6edf3; }
        .section { background: #161b22; border: 1px solid #30363d; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .section-header { padding: 16px 20px; background: #1c2128; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 16px; font-weight: 600; }
        .refresh-btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
        .refresh-btn:hover { background: #2ea043; }
        .agent-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .agent-card { background: #0f1419; border: 1px solid #30363d; border-radius: 10px; padding: 20px; transition: all 0.3s ease; }
        .agent-card.leader { border-color: #ffd700; background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%); }
        .agent-card:hover { border-color: #58a6ff; transform: translateY(-2px); }
        .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .agent-name { font-size: 18px; font-weight: 600; }
        .agent-role { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: #23863633; color: #238636; border: 1px solid #238636; }
        .agent-role.leader { background: #ffd70033; color: #ffd700; border-color: #ffd700; }
        .agent-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; }
        .status-badge { width: 8px; height: 8px; border-radius: 50%; background: #238636; }
        .status-badge.offline { background: #6e7681; }
        .status-badge.busy { background: #f0883e; animation: blink 1s infinite; }
        .status-badge.error { background: #da3633; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .task-list { padding: 20px; }
        .task-table { width: 100%; border-collapse: collapse; }
        .task-table th { text-align: left; padding: 12px; font-size: 12px; color: #8b949e; text-transform: uppercase; border-bottom: 1px solid #30363d; }
        .task-table td { padding: 12px; border-bottom: 1px solid #21262d; font-size: 14px; }
        .task-table tr:hover { background: #1c2128; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        .badge-high { background: #da363333; color: #da3633; border: 1px solid #da3633; }
        .badge-medium { background: #f0883e33; color: #f0883e; border: 1px solid #f0883e; }
        .badge-low { background: #58a6ff33; color: #58a6ff; border: 1px solid #58a6ff; }
        .timestamp { font-size: 12px; color: #6e7681; }
        .error-toast { position: fixed; bottom: 20px; right: 20px; background: #da3633; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 1001; transform: translateX(150%); transition: transform 0.3s ease; }
        .error-toast.show { transform: translateX(0); }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; text-align: center; }
            .metrics-grid { grid-template-columns: 1fr; }
            .agent-grid { grid-template-columns: 1fr; }
            .container { padding: 15px; }
            .task-table { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐺 狼牙团队监控仪表盘</h1>
        <div class="header-controls">
            <div class="refresh-indicator">
                <div class="refresh-icon idle" id="refreshIcon"></div>
                <span id="lastUpdate">更新于: --:--:--</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="systemStatusDot"></div>
                <span id="systemStatus">系统正常运行</span>
            </div>
            <span class="timestamp" id="current-time"></span>
        </div>
    </div>
    
    <div class="container">
        <!-- 核心指标 -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">活跃代理</div>
                <div class="metric-value" id="metric-agents">--/--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">今日完成任务</div>
                <div class="metric-value" id="metric-completed">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">待处理任务</div>
                <div class="metric-value" id="metric-pending">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">系统运行时间</div>
                <div class="metric-value" id="uptime">--</div>
            </div>
        </div>
        
        <!-- 代理状态 -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">🤖 代理状态监控</div>
                <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">↻ 刷新数据</button>
            </div>
            <div class="agent-grid" id="agentGrid">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 任务清单 -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">📋 任务清单</div>
                <span class="timestamp" id="taskCount">--个任务</span>
            </div>
            <div class="task-list">
                <table class="task-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>负责人</th>
                            <th>任务</th>
                            <th>优先级</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="error-toast" id="errorToast"></div>
    
    <script>
        const API_BASE = '/api/v1/dashboard';
        let refreshTimer = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            startAutoRefresh();
            updateTime();
            setInterval(updateTime, 1000);
        });
        
        // 获取数据
        async function fetchData() {
            showRefreshIndicator(true);
            try {
                const response = await fetch(`${API_BASE}`);
                if (!response.ok) throw new Error('API请求失败');
                const result = await response.json();
                if (result.code === 200) {
                    updateDashboard(result.data);
                    showError('');
                }
            } catch (error) {
                console.error('获取数据失败:', error);
                showError('数据加载失败，请检查网络连接');
            } finally {
                showRefreshIndicator(false);
                updateLastRefreshTime();
            }
        }
        
        // 更新仪表盘
        function updateDashboard(data) {
            // 更新指标
            document.getElementById('metric-agents').textContent = 
                `${data.agentStats.online}/${data.agentStats.total}`;
            document.getElementById('metric-completed').textContent = data.taskStats.completed;
            document.getElementById('metric-pending').textContent = data.taskStats.pending;
            document.getElementById('uptime').textContent = data.systemStatus.uptime;
            
            // 更新系统状态
            const dot = document.getElementById('systemStatusDot');
            if (data.systemStatus.status === 'running') {
                dot.className = 'status-dot';
                document.getElementById('systemStatus').textContent = '系统正常运行';
            } else {
                dot.className = 'status-dot error';
                document.getElementById('systemStatus').textContent = '系统异常';
            }
        }
        
        // 显示刷新指示器
        function showRefreshIndicator(loading) {
            const icon = document.getElementById('refreshIcon');
            if (loading) icon.classList.remove('idle');
            else icon.classList.add('idle');
        }
        
        // 更新最后刷新时间
        function updateLastRefreshTime() {
            const timeStr = new Date().toLocaleTimeString('zh-CN');
            document.getElementById('lastUpdate').textContent = `更新于: ${timeStr}`;
        }
        
        // 更新时间
        function updateTime() {
            document.getElementById('current-time').textContent = 
                new Date().toLocaleString('zh-CN');
        }
        
        // 显示错误
        function showError(message) {
            const toast = document.getElementById('errorToast');
            if (message) {
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 5000);
            } else {
                toast.classList.remove('show');
            }
        }
        
        // 刷新数据
        function refreshData() {
            fetchData();
        }
        
        // 启动自动刷新
        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(() => {
                fetchData();
            }, 10000); // 10秒刷新
        }
    </script>
</body>
</html>
